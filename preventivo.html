<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preventivo - PrivatAssistenza</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4ff;font-family:Arial,sans-serif;padding:16px;max-width:560px;margin:0 auto}
.box{background:white;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.btn{display:block;width:100%;padding:20px;border-radius:12px;font-size:19px;font-weight:700;text-align:center;text-decoration:none;margin-bottom:14px;cursor:pointer;border:none}
.si{background:#2e7d32;color:white}
.no{background:white;color:#c62828;border:3px solid #c62828}
.riga{display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px}
.totale-row{display:flex;justify-content:space-between;padding:10px 6px;font-size:16px;font-weight:700;border-top:2px solid #1565C0;margin-top:8px;color:#1565C0}
.tag{background:#e3f2fd;color:#1565C0;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;display:inline-block;margin:2px}
.loader{text-align:center;padding:60px;color:#666;font-size:16px}
.errore{background:#fff3f3;border:2px solid #e53935;border-radius:12px;padding:20px;text-align:center;color:#c62828}
.successo{background:#f1f8e9;border:2px solid #2e7d32;border-radius:12px;padding:24px;text-align:center;color:#2e7d32;font-size:18px;font-weight:700}
</style>
</head>
<body>

<div id="loader" class="loader">⏳ Caricamento preventivo...</div>
<div id="content" style="display:none"></div>
<div id="esito" style="display:none"></div>

<script>
const API = "https://alessia-631113cd.base44.app/api/functions/preventivoA";

async function carica() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  
  if (!id) {
    document.getElementById('loader').innerHTML = '<div class="errore">❌ Link non valido. Contatta PrivatAssistenza.</div>';
    return;
  }

  try {
    const res = await fetch(API + '?id=' + id);
    const html = await res.text();
    
    // Estrai i dati dal JSON se la funzione li restituisce
    // Altrimenti mostra direttamente l'HTML
    if (res.headers.get('content-type')?.includes('application/json')) {
      const data = JSON.parse(html);
      mostraPreventivo(data, id);
    } else {
      // La funzione restituisce HTML direttamente, reindirizzo
      document.open();
      document.write(html);
      document.close();
    }
  } catch(e) {
    document.getElementById('loader').innerHTML = '<div class="errore">❌ Errore nel caricamento. Riprova o contatta PrivatAssistenza al 0577 600904.</div>';
  }
}

async function rispondi(id, azione) {
  document.getElementById('content').style.display = 'none';
  document.getElementById('esito').style.display = 'block';
  document.getElementById('esito').innerHTML = '<div class="loader">⏳ Registrazione risposta...</div>';

  try {
    const res = await fetch(API + '?id=' + id + '&azione=' + azione);
    const html = await res.text();
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    document.getElementById('esito').innerHTML = '<div class="errore">❌ Errore. Chiama il 0577 600904.</div>';
  }
}

carica();
</script>
</body>
</html>
