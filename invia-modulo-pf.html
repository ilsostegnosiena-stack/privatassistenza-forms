<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invia Modulo Professione in Famiglia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 20px; }
  .header { background: linear-gradient(135deg, #1a3a6b, #2a5298); color: white; padding: 20px 24px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 20px; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 15px; color: #1a3a6b; margin-bottom: 14px; font-weight: 700; }
  input, select { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 10px; }
  input:focus, select:focus { border-color: #2a5298; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-primary { background: linear-gradient(135deg, #1a3a6b, #2a5298); color: white; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .cliente-item { padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
  .cliente-item:hover { border-color: #2a5298; background: #f0f4ff; }
  .cliente-item.selected { border-color: #1a3a6b; background: #e8f0ff; }
  .cliente-nome { font-weight: 700; color: #1a3a6b; font-size: 14px; }
  .cliente-email { font-size: 12px; color: #666; margin-top: 2px; }
  .info-box { background: #e8f4fd; border-left: 4px solid #2a5298; padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 13px; color: #1a3a6b; margin-bottom: 16px; }
  .success-box { background: #d4edda; border-left: 4px solid #27ae60; padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 13px; color: #155724; margin-bottom: 16px; display: none; }
  .error-box { background: #f8d7da; border-left: 4px solid #e74c3c; padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 13px; color: #721c24; margin-bottom: 16px; display: none; }
  .spinner { width: 30px; height: 30px; border: 4px solid #e0e0e0; border-top: 4px solid #2a5298; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .search-box { position: relative; margin-bottom: 12px; }
  #cerca { margin-bottom: 0; }
  .nessun-risultato { text-align: center; color: #888; font-size: 13px; padding: 16px; display: none; }
  .badge-firmato { background: #27ae60; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 6px; font-weight: 600; }
  .badge-inviato { background: #2980b9; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 6px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 Modulo Professione in Famiglia</h1>
  <p>Seleziona il cliente e invia il modulo di adesione</p>
</div>

<div class="card">
  <h2>🔍 Cerca cliente</h2>
  <div class="search-box">
    <input type="text" id="cerca" placeholder="Cerca per nome o cognome..." oninput="filtraClienti()">
  </div>
  <div class="spinner" id="spinner-carica"></div>
  <div id="lista-clienti"></div>
  <div class="nessun-risultato" id="nessun-risultato">Nessun cliente trovato</div>
</div>

<div class="card" id="card-invio" style="display:none;">
  <h2>✉️ Invia modulo a</h2>
  <div class="info-box" id="info-cliente"></div>
  <div class="success-box" id="success-msg"></div>
  <div class="error-box" id="error-msg"></div>
  <div class="spinner" id="spinner-invio"></div>
  <button class="btn btn-primary" id="btn-invia" onclick="inviaModulo()">
    📩 Invia Modulo di Adesione
  </button>
</div>

<script>
const API = "https://alessia-631113cd.base44.app/api/functions";
const API_KEY = "8b0dc4f967f94184b29b562c8caacf06";
const CRM_API = "https://alessia-631113cd.base44.app/api";

let tutti = [];
let selezionato = null;

async function caricaClienti() {
  document.getElementById('spinner-carica').style.display = 'block';
  try {
    const r = await fetch(`${CRM_API}/entities/Questionario?api_key=${API_KEY}&limit=500&sort=-created_date`);
    const data = await r.json();
    tutti = (data.records || data || []).filter(q => q.email_referente);
    renderClienti(tutti);
  } catch(e) {
    document.getElementById('lista-clienti').innerHTML = '<p style="color:#c0392b;font-size:13px;">Errore caricamento clienti</p>';
  }
  document.getElementById('spinner-carica').style.display = 'none';
}

function renderClienti(lista) {
  const cont = document.getElementById('lista-clienti');
  const nr = document.getElementById('nessun-risultato');
  if (!lista.length) { cont.innerHTML = ''; nr.style.display = 'block'; return; }
  nr.style.display = 'none';
  cont.innerHTML = lista.slice(0, 30).map(q => {
    const nome = `${q.nome_referente || ''} ${q.cognome_referente || ''}`.trim();
    const assistito = `${q.nome_assistito || ''} ${q.cognome_assistito || ''}`.trim();
    const firmato = q.modulo_pf_firmato_url ? `<span class="badge-firmato">✅ Firmato</span>` : '';
    const inviato = q.modulo_pf_inviato && !q.modulo_pf_firmato_url ? `<span class="badge-inviato">📩 Inviato</span>` : '';
    return `<div class="cliente-item" id="item-${q.id}" onclick="selezionaCliente('${q.id}')">
      <div class="cliente-nome">${nome || 'N/D'} ${firmato}${inviato}</div>
      <div class="cliente-email">📧 ${q.email_referente} ${assistito ? '· Assistito: ' + assistito : ''}</div>
    </div>`;
  }).join('');
}

function filtraClienti() {
  const testo = document.getElementById('cerca').value.toLowerCase().trim();
  if (!testo) { renderClienti(tutti); return; }
  const filtrati = tutti.filter(q => {
    const nome = `${q.nome_referente || ''} ${q.cognome_referente || ''} ${q.nome_assistito || ''} ${q.cognome_assistito || ''}`.toLowerCase();
    return nome.includes(testo) || (q.email_referente || '').toLowerCase().includes(testo);
  });
  renderClienti(filtrati);
}

function selezionaCliente(id) {
  // Deseleziona precedente
  if (selezionato) {
    const prev = document.getElementById('item-' + selezionato.id);
    if (prev) prev.classList.remove('selected');
  }
  selezionato = tutti.find(q => q.id === id);
  if (!selezionato) return;
  document.getElementById('item-' + id).classList.add('selected');

  const nome = `${selezionato.nome_referente || ''} ${selezionato.cognome_referente || ''}`.trim();
  const assistito = `${selezionato.nome_assistito || ''} ${selezionato.cognome_assistito || ''}`.trim();

  document.getElementById('info-cliente').innerHTML =
    `<strong>${nome}</strong><br>
    📧 Email: <strong>${selezionato.email_referente}</strong><br>
    ${assistito ? '🧓 Assistito: <strong>' + assistito + '</strong>' : ''}
    ${selezionato.modulo_pf_firmato_url ? '<br><span style="color:#27ae60;font-weight:bold">✅ Modulo già firmato</span>' : ''}
    ${selezionato.modulo_pf_inviato && !selezionato.modulo_pf_firmato_url ? '<br><span style="color:#2980b9">📩 Modulo già inviato (non ancora firmato)</span>' : ''}`;

  document.getElementById('card-invio').style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('btn-invia').disabled = false;
  document.getElementById('btn-invia').textContent = '📩 Invia Modulo di Adesione';
  document.getElementById('card-invio').scrollIntoView({ behavior: 'smooth' });
}

async function inviaModulo() {
  if (!selezionato) return;
  const btn = document.getElementById('btn-invia');
  btn.disabled = true;
  btn.textContent = '⏳ Invio in corso...';
  document.getElementById('spinner-invio').style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';

  try {
    const r = await fetch(`${API}/inviaModuloProfessioneFamiglia`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: selezionato.id })
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || 'Errore invio');

    document.getElementById('success-msg').innerHTML =
      `✅ Modulo inviato con successo a <strong>${data.email || selezionato.email_referente}</strong>!<br>
      Il cliente riceverà il link per firmare digitalmente.`;
    document.getElementById('success-msg').style.display = 'block';
    btn.textContent = '✅ Inviato!';

    // Aggiorna badge nella lista
    selezionato.modulo_pf_inviato = true;
    renderClienti(tutti.filter(q => {
      const testo = document.getElementById('cerca').value.toLowerCase();
      if (!testo) return true;
      return `${q.nome_referente||''} ${q.cognome_referente||''}`.toLowerCase().includes(testo);
    }));

  } catch(e) {
    document.getElementById('error-msg').textContent = '❌ Errore: ' + e.message;
    document.getElementById('error-msg').style.display = 'block';
    btn.disabled = false;
    btn.textContent = '📩 Riprova';
  }
  document.getElementById('spinner-invio').style.display = 'none';
}

caricaClienti();
</script>
</body>
</html>
