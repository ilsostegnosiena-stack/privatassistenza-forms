// --- UTILITY ----------------------------------------------------------------
const REGEX_LETTERE = /[^a-zA-ZàèéìòùÀÈÉÌÒÙ '\-]/g;
const REGEX_NUMERI  = /[^0-9\s\+\-]/g;

function filtraInput(val, tipo) {
  if (tipo === "lettere") return val.replace(REGEX_LETTERE, "");
  if (tipo === "telefono") return val.replace(REGEX_NUMERI, "");
  return val;
}
function emailValida(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()); }
function dataValida(gg, mm, yyyy) {
  if (!gg || !mm || !yyyy || yyyy.length < 4) return false;
  const d = new Date(`${yyyy}-${mm}-${gg}`);
  return !isNaN(d.getTime()) && d.getFullYear() === parseInt(yyyy);
}
function prossimi30Giorni() {
  const oggi = new Date();
  return Array.from({ length: 30 }, (_, i) => {
    const d = new Date(oggi); d.setDate(oggi.getDate() + i);
    const gg = String(d.getDate()).padStart(2,"0");
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const yyyy = d.getFullYear();
    const label = i===0 ? `Oggi ${gg}/${mm}` : i===1 ? `Domani ${gg}/${mm}` : `${GIORNI_SETT[d.getDay()]} ${gg} ${MESI_BREVI[d.getMonth()]}`;
    return { label, value: `${gg}/${mm}/${yyyy}` };
  });
}

// --- HOOK DATI COMUNI --------------------------------------------------------
function useComuniItalia() {
  const [dati, setDati] = useState(null);
  const [sigle, setSigle] = useState({});

  useEffect(() => {
    // Carichiamo da CDN affidabile
    fetch("https://raw.githubusercontent.com/matteocontrini/comuni-json/master/comuni.json")
      .then(r => r.json())
      .then(comuni => {
        const struttura = {};
        const siglaMap = {};
        comuni.forEach(c => {
          const reg = c.regione.nome;
          const prov = c.provincia.nome;
          const nome = c.nome;
          const sigla = c.sigla;
          if (!struttura[reg]) struttura[reg] = {};
          if (!struttura[reg][prov]) struttura[reg][prov] = [];
          struttura[reg][prov].push(nome);
          if (!siglaMap[prov]) siglaMap[prov] = sigla;
        });
        // Ordina
        Object.keys(struttura).forEach(r => {
          Object.keys(struttura[r]).forEach(p => struttura[r][p].sort());
          struttura[r] = Object.fromEntries(Object.entries(struttura[r]).sort());
        });
        const ordinata = Object.fromEntries(Object.entries(struttura).sort());
        setDati(ordinata);
        setSigle(siglaMap);
      })
      .catch(() => {
        // Fallback: dati minimi Toscana
        setDati({ "Toscana": { "Siena": ["Siena","Poggibonsi","Grosseto"] } });
        setSigle({ "Siena": "SI" });
      });
  }, []);

  return { dati, sigle };
}

// --- COMPONENTE SELEZIONE LUOGO ---------------------------------------------
function SelezioneLuogo({ onComplete, datiComuni, sigleComuni }) {
  const [regione, setRegione] = useState("");
  const [provincia, setProvincia] = useState("");
  const [comune, setComune] = useState("");
  const [filtro, setFiltro] = useState("");

  if (!datiComuni) return <div style={{color:"#666",fontSize:14}}>Caricamento comuni...</div>;

  const regioni = Object.keys(datiComuni).sort();
  const province = regione ? Object.keys(datiComuni[regione]).sort() : [];
  const tuttiComuni = (regione && provincia && datiComuni[regione]?.[provincia]) || [];
  const comuniFiltrati = filtro.trim().length > 0
    ? tuttiComuni.filter(c => c.toLowerCase().includes(filtro.toLowerCase())).slice(0, 60)
    : tuttiComuni.slice(0, 80);

  const selStyle = {
    border: "2px solid #1565C0", borderRadius: 10, padding: "10px 12px",
    fontSize: 15, background: "white", width: "100%", cursor: "pointer"
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
      <select value={regione} onChange={e => { setRegione(e.target.value); setProvincia(""); setComune(""); setFiltro(""); }} style={selStyle}>
        <option value="">- Seleziona Regione -</option>
        {regioni.map(r => <option key={r} value={r}>{r}</option>)}
      </select>

      {regione && (
        <select value={provincia} onChange={e => { setProvincia(e.target.value); setComune(""); setFiltro(""); }} style={selStyle}>
          <option value="">- Seleziona Provincia -</option>
          {province.map(p => <option key={p} value={p}>{p}{sigleComuni[p] ? ` (${sigleComuni[p]})` : ""}</option>)}
        </select>
      )}

      {provincia && (
        <>
          <input
            value={filtro}
            onChange={e => setFiltro(e.target.value)}
            placeholder=" Cerca comune..."
            style={{ border:"2px solid #1565C0", borderRadius:10, padding:"9px 12px", fontSize:15, width:"100%", boxSizing:"border-box" }}
          />
          <div style={{ maxHeight:200, overflowY:"auto", border:"2px solid #1565C0", borderRadius:10, background:"white" }}>
            {comuniFiltrati.length === 0 && <div style={{padding:12,color:"#999",fontSize:14}}>Nessun comune trovato</div>}
            {comuniFiltrati.map(c => (
              <div key={c} onClick={() => {
                setComune(c);
                const sigla = sigleComuni[provincia] || "";
                onComplete({ regione, provincia, comune: c, sigla });
              }}
                style={{
                  padding:"9px 14px", cursor:"pointer", fontSize:14,
                  background: comune===c ? "#1565C0" : "white",
                  color: comune===c ? "white" : "#222",
                  borderBottom:"1px solid #f0f0f0"
                }}>
                {c}
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// --- COMPONENTE SELEZIONE MULTIPLA -------------------------------------------
function SceltaMultipla({ opzioni, onComplete, labelConferma }) {
  const [sel, setSel] = useState([]);
  const toggle = (o) => setSel(prev => prev.includes(o) ? prev.filter(x=>x!==o) : [...prev, o]);
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
        {opzioni.map(o => (
          <button key={o} onClick={() => toggle(o)}
            style={{
              background: sel.includes(o) ? "#1565C0" : "white",
              color: sel.includes(o) ? "white" : "#1565C0",
              border:"2px solid #1565C0", borderRadius:20, padding:"8px 14px", fontSize:14, cursor:"pointer", fontWeight:600
            }}>{o}</button>
        ))}
      </div>
      <button onClick={() => { if(sel.length>0) onComplete(sel.join(", "), sel.join(", ")); }}
        disabled={sel.length===0}
        style={{ background:sel.length>0?"#1565C0":"#ccc", color:"white", border:"none", borderRadius:20, padding:"10px 20px", fontSize:15, cursor:sel.length>0?"pointer":"not-allowed", fontWeight:700, marginTop:4 }}>
        {labelConferma || `Conferma (${sel.length} selezionati) -&gt;`}
      </button>
    </div>
  );
}

// --- COMPONENTE CALENDARIO SERVIZIO -----------------------------------------
function CalendarioServizio({ onComplete }) {
  const dateRapide = prossimi30Giorni();
  const [giorniDati, setGiorniDati] = useState({});
  const [giornoAttivo, setGiornoAttivo] = useState(null);
  // "scegli_giorno" | "imposta_orari" | "chiedi_altro"
  const [fase, setFase] = useState("scegli_giorno");

  function selezionaGiorno(value) {
    if (giorniDati[value]) return; // già aggiunto
    const nuovi = { ...giorniDati, [value]: { ore: [], notte: null, integr: [] } };
    setGiorniDati(nuovi);
    setGiornoAttivo(value);
    setFase("imposta_orari");
  }

  function toggleOra(giorno, ora) {
    setGiorniDati(prev => ({
      ...prev,
      [giorno]: { ...prev[giorno], ore: prev[giorno].ore.includes(ora) ? prev[giorno].ore.filter(o=>o!==ora) : [...prev[giorno].ore, ora].sort() }
    }));
  }

  function setNotte(giorno, notte) {
    setGiorniDati(prev => ({
      ...prev,
      [giorno]: { ...prev[giorno], notte: prev[giorno].notte===notte ? null : notte, integr: prev[giorno].notte===notte ? [] : prev[giorno].integr }
    }));
  }

  function toggleIntegr(giorno, ora) {
    setGiorniDati(prev => ({
      ...prev,
      [giorno]: { ...prev[giorno], integr: prev[giorno].integr.includes(ora) ? prev[giorno].integr.filter(o=>o!==ora) : [...prev[giorno].integr, ora].sort() }
    }));
  }

  const giorniSel = Object.keys(giorniDati);
  const giornoCorrenteOk = giornoAttivo && (giorniDati[giornoAttivo]?.ore.length > 0 || giorniDati[giornoAttivo]?.notte);
  const tuttiValidi = giorniSel.length > 0 && giorniSel.every(g => giorniDati[g].ore.length > 0 || giorniDati[g].notte);
  // Giorni ancora disponibili (non ancora aggiunti)
  const giorniDisponibili = dateRapide.filter(d => !giorniDati[d.value]);

  function handleConferma() {
    const righe = giorniSel.map(g => {
      const d = giorniDati[g];
      const label = dateRapide.find(x => x.value === g)?.label || g;
      let parts = [];
      if (d.ore.length > 0) parts.push(" " + d.ore.join(", "));
      if (d.notte) parts.push(" " + d.notte);
      if (d.integr.length > 0) parts.push("+ " + d.integr.join(", "));
      return label + " -&gt; " + parts.join(" | ");
    });
    onComplete(righe.join(" || "), righe.join("\n"));
  }

  const btnSel = (attivo) => ({
    background: attivo ? "#1565C0" : "white", color: attivo ? "white" : "#1565C0",
    border: "2px solid #1565C0", borderRadius: 20, padding: "8px 14px",
    fontSize: 13, cursor: "pointer", fontWeight: 600
  });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

      {/* FASE: scegli giorno */}
      {fase === "scegli_giorno" && (
        <>
          <div style={{ fontSize:13, color:"#1565C0", fontWeight:700 }}> Seleziona il giorno:</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
            {giorniDisponibili.map(({ label, value }) => (
              <button key={value} onClick={() => selezionaGiorno(value)} style={btnSel(false)}>{label}</button>
            ))}
            {giorniDisponibili.length === 0 && <div style={{fontSize:13,color:"#888"}}>Tutti i giorni sono stati aggiunti.</div>}
          </div>
        </>
      )}

      {/* FASE: imposta orari */}
      {fase === "imposta_orari" && giornoAttivo && giorniDati[giornoAttivo] && (
        <div style={{ background:"#f5f8ff", borderRadius:14, padding:14, border:"2px solid #1565C0", display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ fontSize:14, color:"#1565C0", fontWeight:700 }}>
             {dateRapide.find(d => d.value === giornoAttivo)?.label || giornoAttivo}
          </div>

          {/* Ore diurne */}
          <div>
            <div style={{ fontSize:12, color:"#555", fontWeight:600, marginBottom:6 }}> Ore diurne (07:00-20:00):</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {ORE_DIURNE.map(o => {
                const sel = giorniDati[giornoAttivo].ore.includes(o);
                return (
                  <button key={o} onClick={() => toggleOra(giornoAttivo, o)}
                    style={{ background:sel?"#1565C0":"white", color:sel?"white":"#1565C0", border:"2px solid #1565C0", borderRadius:16, padding:"5px 11px", fontSize:13, cursor:"pointer", fontWeight:600 }}>
                    {o}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Notte */}
          <div>
            <div style={{ fontSize:12, color:"#555", fontWeight:600, marginBottom:6 }}> Notte:</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {NOTTI.map(n => {
                const sel = giorniDati[giornoAttivo].notte === n;
                return (
                  <button key={n} onClick={() => setNotte(giornoAttivo, n)}
                    style={{ background:sel?"#1565C0":"white", color:sel?"white":"#1565C0", border:"2px solid #1565C0", borderRadius:16, padding:"6px 14px", fontSize:13, cursor:"pointer", fontWeight:600 }}>
                    {sel ? "v " : ""}{n}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Ore integrative - solo se c'è la notte */}
          {giorniDati[giornoAttivo].notte && (
            <div>
              <div style={{ fontSize:12, color:"#555", fontWeight:600, marginBottom:6 }}>+ Ore integrative (opzionale):</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {ORE_INTEGRATIVE.map(o => {
                  const sel = giorniDati[giornoAttivo].integr.includes(o);
                  return (
                    <button key={o} onClick={() => toggleIntegr(giornoAttivo, o)}
                      style={{ background:sel?"#1565C0":"white", color:sel?"white":"#1565C0", border:"2px solid #1565C0", borderRadius:16, padding:"5px 11px", fontSize:13, cursor:"pointer", fontWeight:600 }}>
                      {sel ? "v " : ""}{o}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Pulsante: orari ok, vai a chiedi_altro */}
          <button onClick={() => { if(giornoCorrenteOk) setFase("chiedi_altro"); }}
            disabled={!giornoCorrenteOk}
            style={{ background:giornoCorrenteOk?"#1565C0":"#ccc", color:"white", border:"none", borderRadius:20, padding:"10px 20px", fontSize:15, cursor:giornoCorrenteOk?"pointer":"not-allowed", fontWeight:700 }}>
            Conferma orari per questo giorno -&gt;
          </button>
        </div>
      )}

      {/* FASE: chiedi altro giorno */}
      {fase === "chiedi_altro" && (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

          {/* Riepilogo giorni già inseriti */}
          <div style={{ background:"#e8f5e9", borderRadius:10, padding:"10px 14px", fontSize:13 }}>
            <strong> Riepilogo:</strong>
            {giorniSel.map(g => {
              const d = giorniDati[g];
              const label = dateRapide.find(x => x.value === g)?.label || g;
              return (
                <div key={g} style={{ marginTop:5 }}>
                  <strong>{label}</strong>:{" "}
                  {d.ore.length > 0 && <span> {d.ore.join(", ")} </span>}
                  {d.notte && <span> {d.notte} </span>}
                  {d.integr.length > 0 && <span>+ {d.integr.join(", ")}</span>}
                </div>
              );
            })}
          </div>

          <div style={{ fontSize:14, color:"#1565C0", fontWeight:700 }}>Vuole aggiungere un altro giorno?</div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            <button onClick={() => setFase("scegli_giorno")}
              style={{ background:"white", color:"#1565C0", border:"2px solid #1565C0", borderRadius:20, padding:"9px 18px", fontSize:14, cursor:"pointer", fontWeight:700 }}>

function renderTesto(t) {
  if (!t) return "";
  return t.split(/\*\*(.+?)\*\*/g).map((p,i) => i%2===1 ? <strong key={i}>{p}</strong> : p);
}

function trovaStep(da, dati) {
  for (let i = da; i < STEPS.length; i++) {
    if (!STEPS[i].saltaSe || !STEPS[i].saltaSe(dati)) return i;
  }
  return STEPS.length;
}

export default function ClienteAssistenza() {
  const { dati: datiComuni, sigle: sigleComuni } = useComuniItalia();
  const [stepIdx, setStepIdx] = useState(0);
  const [dati, setDati] = useState({});
  const [messaggi, setMessaggi] = useState([]);
  const [input, setInput] = useState("");
  const [errore, setErrore] = useState("");
  const [completato, setCompletato] = useState(false);
  const [invio, setInvio] = useState(false);
  const bottomRef = useRef(null);
  const dateRapide = prossimi30Giorni();

  useEffect(() => {
    const idx = trovaStep(0, {});
    setStepIdx(idx);
    setMessaggi([{ da:"bot", testo: STEPS[idx].domanda }]);
  }, []);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messaggi]);

  const step = stepIdx < STEPS.length ? STEPS[stepIdx] : null;

  function avanza(valore, testoVisibile) {
    const nuovi = { ...dati, [step.key]: valore };
    setDati(nuovi);
    setInput(""); setErrore(""); 
    setMessaggi(prev => [...prev, { da:"utente", testo: testoVisibile ?? String(valore) }]);
    const next = trovaStep(stepIdx + 1, nuovi);
    setStepIdx(next);
    if (next >= STEPS.length) {
      setTimeout(() => inviaFinale(nuovi), 500);
    } else {
      setTimeout(() => setMessaggi(prev => [...prev, { da:"bot", testo: STEPS[next].domanda }]), 400);
    }
  }

  function handleInvioTesto() {
    const v = input.trim();
    if (!v) {
      if (step.opzionale) { avanza("", "-"); return; }
      setErrore("Campo obbligatorio"); return;
    }
    if (step.tipo === "email" && !emailValida(v)) { setErrore("Email non valida (es: nome@dominio.it)"); return; }
    if (step.tipo === "telefono" && v.replace(/[\s\+\-]/g,"").length < 5) { setErrore("Inserire almeno 5 cifre"); return; }
    avanza(v, v);
  }

      if (p.nascita_assistito) { p.comune_nascita_assistito = p.nascita_assistito.comune; p.provincia_nascita_assistito = p.nascita_assistito.sigla; }
      if (p.residenza_assistito) { p.via_residenza_assistito = p.residenza_assistito.via; p.comune_residenza_assistito = p.residenza_assistito.comune; p.provincia_residenza_assistito = p.residenza_assistito.sigla; }
      p.aliquota_iva = "5%"; p.stato = "Nuovo";
      const res = await fetch("https://alessia-631113cd.base44.app/api/functions/salvaClienteAssistenza", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "api-key":"8b0dc4f967f94184b29b562c8caacf06" },
        body: JSON.stringify(p)
      });
      const json = await res.json();
      if (json.ok) {
        setMessaggi(prev => [...prev, { da:"bot", testo:"OK Dati registrati con successo!\n\nGrazie per aver compilato il modulo. Il nostro team la contatterà a breve. " }]);

          {/* Indirizzo */}
          {step.tipo === "indirizzo" && (
            <InputIndirizzo datiComuni={datiComuni} sigleComuni={sigleComuni} onComplete={l => avanza(l, `${l.via}, ${l.comune} (${l.sigla})`)} />
          )}

          {/* Data */}
          {step.tipo === "data" && (
            <InputData onComplete={v => avanza(v, v)} />
          )}

          {/* Calendario servizio (giorni + fasce per giorno) */}
          {step.tipo === "calendario" && (
            <CalendarioServizio onComplete={(val, vis) => avanza(val, vis)} />
          )}

          {/* Privacy */}
          {step.tipo === "privacy" && (
            <ConsensoPrivacy domanda={step.domanda} onComplete={(val, vis) => avanza(val, vis)} />
          )}

          {/* Ospedale */}
          {step.tipo === "ospedale" && (
            <DettaglioOspedale onComplete={(val, vis) => avanza(val, vis)} />
          )}

          {/* RSA */}
          {step.tipo === "rsa" && (
            <DettaglioRSA onComplete={(val, vis) => avanza(val, vis)} />
          )}

          {/* Testo / lettere / telefono / email */}
          {["testo","lettere","telefono","email"].includes(step.tipo) && (
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              <div style={{ display:"flex", gap:8 }}>
                <input
                  value={input}
                  onChange={e => {
                    const v = filtraInput(e.target.value, step.tipo);
                    setInput(v);
                    setErrore("");
                  }}
                  onKeyDown={e => { if(e.key==="Enter") handleInvioTesto(); }}
                  placeholder={step.opzionale ? "Opzionale - lasci vuoto per saltare" : "Scrivi qui..."}
                  inputMode={step.tipo==="telefono" ? "tel" : step.tipo==="email" ? "email" : "text"}
                  style={{
                    flex:1, border:`2px solid ${errore?"#e53935":"#1565C0"}`,
                    borderRadius:24, padding:"10px 16px", fontSize:15, outline:"none"
                  }}
                  autoFocus
                />
                <button
                  onClick={handleInvioTesto}
                  disabled={!input.trim() && !step.opzionale}
                  style={{ background:(input.trim()||step.opzionale)?"#1565C0":"#ccc", color:"white", border:"none", borderRadius:"50%", width:44, height:44, fontSize:20, cursor:(input.trim()||step.opzionale)?"pointer":"not-allowed" }}>
                  >
                </button>
              </div>
              {errore && <div style={{ color:"#e53935", fontSize:13, paddingLeft:8 }}>! {errore}</div>}
              {step.tipo==="lettere" && input.length>0 && <div style={{ color:"#888", fontSize:12, paddingLeft:8 }}>Solo lettere - i numeri non sono ammessi</div>}
              {step.tipo==="telefono" && input.length>0 && <div style={{ color:"#888", fontSize:12, paddingLeft:8 }}>Solo numeri - le lettere non sono ammesse</div>}
            </div>
          )}

        </div>
      )}

      {completato && (
        <div style={{ textAlign:"center", padding:"20px 24px", background:"#e8f5e9", borderRadius:16, maxWidth:560, margin:"16px 12px" }}>
          <div style={{ fontSize:32 }}>OK</div>
          <div style={{ color:"#2e7d32", fontWeight:700, fontSize:17, marginTop:8 }}>Modulo completato!</div>
          <div style={{ color:"#555", fontSize:14, marginTop:6 }}>Verrete contattati dal nostro ufficio a breve.</div>
        </div>
      )}
    </div>
  );
}

// Override: monta il componente
const { useState, useRef, useEffect } = React;
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ClienteAssistenza));
</script>
</body>
</html>
